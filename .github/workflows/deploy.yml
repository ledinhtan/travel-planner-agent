# .github/workflows/deploy.yml
name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
    workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build and push Docker image
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}
    - run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/travel-planner-agent:${{ github.sha }} .
        docker tag ${{ secrets.ACR_LOGIN_SERVER }}/travel-planner-agent:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/travel-planner-agent:latest
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/travel-planner-agent:${{ github.sha }}
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/travel-planner-agent:latest

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        images: ${{ secrets.ACR_LOGIN_SERVER }}/travel-planner-agent:${{ github.sha }}